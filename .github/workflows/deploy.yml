name: Deploy Dashboard

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject API key
        run: |
          python3 -c "
          content = open('index.html').read()
          content = content.replace('ANTHROPIC_API_KEY_PLACEHOLDER', '${{ secrets.ANTHROPIC_API_KEY }}')
          open('index.html', 'w').write(content)
          print('Done, replaced:', content.count('sk-ant') > 0)
          "

      - name: Push updated file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add index.html
          git diff --cached --quiet && echo "No changes" || (git commit -m "Deploy [skip ci]" && git push)
